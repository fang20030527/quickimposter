<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quick Imposter Figma Reference</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 80px; background: #ececf4; font-family: Arial, sans-serif; }
      main { display: flex; align-items: flex-start; gap: 80px; }
      figure { margin: 0; padding: 24px; background: white; border-radius: 20px; box-shadow: 0 18px 60px rgba(20, 8, 54, .14); }
      img { display: block; height: auto; }
      .desktop img { width: 1536px; }
      .mobile img { width: 793px; }
      figcaption { margin: 18px 0 0; font-size: 24px; font-weight: 700; color: #190b44; }
    </style>
  </head>
  <body>
    <main>
      <figure class="desktop">
        <img src="desktop.png" alt="Desktop prototype reference" />
        <figcaption>Desktop reference - 1536px</figcaption>
      </figure>
      <figure class="mobile">
        <img src="mobile.png" alt="Mobile prototype reference" />
        <figcaption>Mobile reference - 793px</figcaption>
      </figure>
    </main>
  </body>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</html>
