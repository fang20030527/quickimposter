    </linearGradient>
    <linearGradient id="secret" x1="68" y1="130" x2="145" y2="184" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7040B0"/>
      <stop offset="1" stop-color="#4A237E"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#24104C" flood-opacity=".3"/>
    </filter>
    <filter id="phoneShadow" x="-30%" y="-20%" width="180%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#1C063F" flood-opacity=".42"/>
    </filter>
  </defs>

  <g fill="none" stroke="#6D28D9" stroke-width="7" stroke-linecap="round">
    <path d="m21 202-13-7m17-6-5-14m18 12 8-12"/>
  </g>
  <path d="m270 8 6 17 17 7-17 6-6 18-7-18-17-6 17-7 7-17Z" fill="#FFC914"/>
  <path d="m270 15 3 10 10 4-10 4-3 10-4-10-10-4 10-4 4-10Z" fill="#FFE477" opacity=".72"/>

  <g filter="url(#cardShadow)" transform="rotate(10 216 146)">
    <rect x="143" y="43" width="146" height="210" rx="17" fill="url(#cardEdge)"/>
    <rect x="138" y="37" width="146" height="210" rx="17" fill="url(#card)" stroke="#2A075F" stroke-width="3"/>
    <path d="M151 50h119v17c-29-11-68-10-119 3V50Z" fill="#D7A8FF" opacity=".22"/>
    <path d="M151 52v180" stroke="#CFA1FF" stroke-width="2" opacity=".32"/>
    <text x="219" y="111" fill="#FFFFFF" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="36" font-weight="800" text-anchor="middle" letter-spacing="-1">PASS</text>
    <text x="229" y="136" fill="#FFFFFF" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" text-anchor="middle" letter-spacing=".2">CLOCKWISE</text>
    <path d="M190 185a31 31 0 1 1 11 24" fill="none" stroke="#EFE3FF" stroke-width="9" stroke-linecap="round"/>
    <path d="m187 210 5-22 18 13-23 9Z" fill="#EFE3FF"/>
  </g>

  <g filter="url(#phoneShadow)">
