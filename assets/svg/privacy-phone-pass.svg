<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" role="img" aria-label="Pass the phone clockwise privacy illustration">
  <defs>
    <linearGradient id="card" x1="148" y1="38" x2="286" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A95BFF"/>
      <stop offset=".48" stop-color="#762DE0"/>
      <stop offset="1" stop-color="#4A168D"/>
    </linearGradient>
    <linearGradient id="cardEdge" x1="145" y1="50" x2="286" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#54209A"/>
      <stop offset="1" stop-color="#260852"/>
    </linearGradient>
    <linearGradient id="phone" x1="37" y1="12" x2="176" y2="267" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A176E"/>
      <stop offset=".18" stop-color="#251052"/>
      <stop offset="1" stop-color="#100422"/>
    </linearGradient>
    <linearGradient id="screen" x1="54" y1="44" x2="158" y2="229" gradientUnits="userSpaceOnUse">
      <stop stop-color="#35136A"/>
      <stop offset=".56" stop-color="#260D52"/>
