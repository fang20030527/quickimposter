    <rect x="28" y="119" width="8" height="28" rx="4" fill="#2B0D5D"/>
    <rect x="170" y="82" width="7" height="55" rx="3.5" fill="#17052F"/>
    <rect x="34" y="9" width="142" height="258" rx="31" fill="#1A063A" stroke="#4E2581" stroke-width="4"/>
    <rect x="39" y="13" width="132" height="248" rx="27" fill="url(#phone)" stroke="#190534" stroke-width="3"/>
