    <path d="M72 139h66" stroke="#A87CDC" stroke-width="1" opacity=".35"/>
    <text x="105" y="155" fill="#FFFFFF" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Your word</text>
    <text x="105" y="171" fill="#FFFFFF" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle">appears here</text>

    <path d="M77 208c9-12 18-18 28-18s19 6 28 18c-9 12-18 18-28 18s-19-6-28-18Z" fill="#F8F4FF"/>
    <circle cx="105" cy="208" r="9" fill="#6130A0"/>
    <circle cx="105" cy="208" r="3.5" fill="#16052F"/>
